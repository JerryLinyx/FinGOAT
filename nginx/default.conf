server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Health check endpoint
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Backend API (includes SSE streaming endpoints)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering so streaming events pass through immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Python trading service is internal-only — no public route.
    # All trading API calls go through Go backend at /api/trading/*.

    # Frontend (SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
